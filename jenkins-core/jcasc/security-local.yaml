# security-local.yaml — Local security realm (development / fallback)
# Activated automatically by entrypoint.sh when OIDC_ISSUER is not set.
# Provides a local admin account for dev and as an escape hatch.

jenkins:
  securityRealm:
    local:
      allowsSignup: false
      enableCaptcha: false
      users:
        - id: "${ADMIN_USER:-admin}"
          password: "${ADMIN_PASSWORD:-admin}"
          name: "Jenkins Admin"
          properties:
            - mailer:
                emailAddress: "${ADMIN_EMAIL:-admin@example.com}"
