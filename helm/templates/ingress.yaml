{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "jenkins-plus.fullname" . }}
  labels:
    {{- include "jenkins-plus.labels" . | nindent 4 }}
  annotations:
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tls }}
  tls:
    - hosts:
        - {{ .Values.ingress.host | quote }}
      secretName: {{ .Values.ingress.tlsSecretName }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "jenkins-plus.fullname" . }}
                port:
                  number: 8080
          {{- if .Values.ui.enabled }}
          - path: /ui
            pathType: Prefix
            backend:
              service:
                name: {{ include "jenkins-plus.fullname" . }}-ui
                port:
                  number: 3000
          {{- end }}
{{- end }}
