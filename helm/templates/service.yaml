apiVersion: v1
kind: Service
metadata:
  name: {{ include "jenkins-plus.fullname" . }}
  labels:
    {{- include "jenkins-plus.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "jenkins-plus.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: controller
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
---
{{- if .Values.ui.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "jenkins-plus.fullname" . }}-ui
  labels:
    {{- include "jenkins-plus.labels" . | nindent 4 }}
    app.kubernetes.io/component: ui
spec:
  type: ClusterIP
  selector:
    {{- include "jenkins-plus.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: ui
  ports:
    - name: http
      port: 3000
      targetPort: http
      protocol: TCP
{{- end }}
