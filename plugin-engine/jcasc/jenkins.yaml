# jenkins-plus — Configuration as Code (JCasC)
# All env-var references use ${VAR:-default} syntax so the controller boots
# safely even when optional integrations are not yet configured.
#
# Required env vars (no safe default — must be supplied):
#   JENKINS_URL, ADMIN_USER, ADMIN_PASSWORD
#
# Optional env vars (have safe defaults):
#   JENKINS_SYSTEM_MESSAGE, JENKINS_NUM_AGENTS, KUBE_API_URL,
#   JENKINS_NAMESPACE, OIDC_ISSUER, OIDC_CLIENT_ID, OIDC_CLIENT_SECRET,
#   GITHUB_APP_ID, GITHUB_APP_KEY, GITLAB_TOKEN, VAULT_URL,
#   VAULT_ROLE_ID, VAULT_SECRET_ID, SLACK_TOKEN, SLACK_TEAM_DOMAIN,
#   SONAR_URL, SONAR_TOKEN, DOCKER_REGISTRY_URL, DOCKER_REGISTRY_USER,
#   DOCKER_REGISTRY_PASSWORD, SHARED_LIB_REPO, SHARED_LIB_BRANCH,
#   SEED_JOB_REPO, SEED_JOB_BRANCH

jenkins:
  systemMessage: "${JENKINS_SYSTEM_MESSAGE:-Welcome to jenkins-plus — your enterprise-grade CI/CD platform}"

  # Controller runs no executors; all work goes to agents
  numExecutors: 0
  mode: EXCLUSIVE

  # Modern WebSocket transport — avoids JNLP firewall issues
  agentProtocols:
    - "WebSocket"

  # ── Security realm ─────────────────────────────────────────────────────────
  # Use OIDC when OIDC_ISSUER is provided; fall back to local accounts otherwise.
  securityRealm:
    oic:
      clientId: "${OIDC_CLIENT_ID:-jenkins-plus}"
      clientSecret: "${OIDC_CLIENT_SECRET:-change-me-in-production}"
      wellKnownOpenIDConfigurationUrl: "${OIDC_ISSUER:-https://accounts.example.com}/.well-known/openid-configuration"
      userNameField: "preferred_username"
      emailFieldName: "email"
      fullNameFieldName: "name"
      groupsFieldName: "groups"
      scopes: "openid profile email groups"
      logoutFromOpenidProvider: true
      postLogoutRedirectUrl: "${JENKINS_URL:-http://localhost:8080}/login"
      escapeHatchEnabled: true
      escapeHatchUsername: "${ADMIN_USER:-admin}"
      escapeHatchSecret: "${ADMIN_PASSWORD:-admin}"

  # ── Authorisation strategy ─────────────────────────────────────────────────
  authorizationStrategy:
    projectMatrix:
      permissions:
        # Full admin for the escape-hatch / service account
        - "USER:hudson.model.Hudson.Administer:${ADMIN_USER:-admin}"
        # Authenticated users get read access across the board
        - "GROUP:hudson.model.Hudson.Read:authenticated"
        - "GROUP:hudson.model.Item.Read:authenticated"
        - "GROUP:hudson.model.Item.Build:authenticated"
        - "GROUP:hudson.model.Item.Cancel:authenticated"
        - "GROUP:hudson.model.Item.Workspace:authenticated"
        - "GROUP:hudson.model.Run.Replay:authenticated"
        - "GROUP:hudson.model.View.Read:authenticated"
        # Anonymous gets nothing (deny-by-default)

  # ── CSRF protection ────────────────────────────────────────────────────────
  crumbIssuer:
    standard:
      excludeClientIPFromCrumb: true

  # ── Quiet period & retry ───────────────────────────────────────────────────
  quietPeriod: 5
  scmCheckoutRetryCount: 2

  # ── Global node properties ─────────────────────────────────────────────────
  globalNodeProperties:
    - envVars:
        env:
          - key: "JENKINS_PLUS_VERSION"
            value: "1.0.0"
          - key: "DOCKER_REGISTRY"
            value: "${DOCKER_REGISTRY_URL:-registry.example.com}"

  # ── Kubernetes cloud ───────────────────────────────────────────────────────
  clouds:
    - kubernetes:
        name: "kubernetes"
        serverUrl: "${KUBE_API_URL:-https://kubernetes.default.svc}"
        namespace: "${JENKINS_NAMESPACE:-jenkins}"
        jenkinsUrl: "${JENKINS_URL:-http://jenkins:8080}"
        credentialsId: ""
        connectTimeout: 5
        readTimeout: 15
        containerCapStr: "20"
        maxRequestsPerHostStr: "32"
        retryCount: 3
        podRetention:
          never: {}
        podTemplates:

          # ── docker-agent ─────────────────────────────────────────────────
          - name: "docker-agent"
            label: "docker docker-build"
            namespace: "${JENKINS_NAMESPACE:-jenkins}"
            serviceAccount: "jenkins-agent"
            nodeUsageMode: NORMAL
            idleMinutes: 5
            instanceCap: 10
            imagePullSecrets:
              - name: "registry-pull-secret"
            containers:
              - name: "jnlp"
                image: "jenkins/inbound-agent:3261.v9c670a_4748a_9-1"
                alwaysPullImage: false
                workingDir: "/home/jenkins/agent"
                ttyEnabled: false
                resourceRequestCpu: "100m"
                resourceRequestMemory: "256Mi"
                resourceLimitCpu: "500m"
                resourceLimitMemory: "512Mi"
              - name: "docker"
                image: "docker:26.1.3"
                alwaysPullImage: false
                workingDir: "/home/jenkins/agent"
                ttyEnabled: true
                privileged: false
                command: "/bin/sh -c"
                args: "cat"
                resourceRequestCpu: "200m"
                resourceRequestMemory: "256Mi"
                resourceLimitCpu: "2000m"
                resourceLimitMemory: "2Gi"
                envVars:
                  - envVar:
                      key: "DOCKER_HOST"
                      value: "tcp://localhost:2375"
              - name: "dind"
                image: "docker:26.1.3-dind"
                alwaysPullImage: false
                workingDir: "/home/jenkins/agent"
                ttyEnabled: true
                privileged: true
                command: "dockerd-entrypoint.sh"
                args: "--host=tcp://0.0.0.0:2375 --host=unix:///var/run/docker.sock --storage-driver=overlay2"
                resourceRequestCpu: "200m"
                resourceRequestMemory: "512Mi"
                resourceLimitCpu: "2000m"
                resourceLimitMemory: "4Gi"
            volumes:
              - emptyDirVolume:
                  memory: false
                  mountPath: "/var/lib/docker"
            annotations:
              - annotation:
                  key: "cluster-autoscaler.kubernetes.io/safe-to-evict"
                  value: "false"

          # ── node-agent ───────────────────────────────────────────────────
          - name: "node-agent"
            label: "node nodejs node20"
            namespace: "${JENKINS_NAMESPACE:-jenkins}"
            serviceAccount: "jenkins-agent"
            nodeUsageMode: NORMAL
            idleMinutes: 5
            instanceCap: 10
            containers:
              - name: "jnlp"
                image: "jenkins/inbound-agent:3261.v9c670a_4748a_9-1"
                alwaysPullImage: false
                workingDir: "/home/jenkins/agent"
                ttyEnabled: false
                resourceRequestCpu: "100m"
                resourceRequestMemory: "256Mi"
                resourceLimitCpu: "500m"
                resourceLimitMemory: "512Mi"
              - name: "node"
                image: "node:20.14.0-alpine3.20"
                alwaysPullImage: false
                workingDir: "/home/jenkins/agent"
                ttyEnabled: true
                command: "/bin/sh -c"
                args: "cat"
                resourceRequestCpu: "250m"
                resourceRequestMemory: "512Mi"
                resourceLimitCpu: "2000m"
                resourceLimitMemory: "2Gi"
                envVars:
                  - envVar:
                      key: "NPM_CONFIG_CACHE"
                      value: "/home/jenkins/.npm"
            volumes:
              - persistentVolumeClaim:
                  claimName: "npm-cache-pvc"
                  mountPath: "/home/jenkins/.npm"
                  readOnly: false

          # ── python-agent ─────────────────────────────────────────────────
          - name: "python-agent"
            label: "python python3 python312"
            namespace: "${JENKINS_NAMESPACE:-jenkins}"
            serviceAccount: "jenkins-agent"
            nodeUsageMode: NORMAL
            idleMinutes: 5
            instanceCap: 10
            containers:
              - name: "jnlp"
                image: "jenkins/inbound-agent:3261.v9c670a_4748a_9-1"
                alwaysPullImage: false
                workingDir: "/home/jenkins/agent"
                ttyEnabled: false
                resourceRequestCpu: "100m"
                resourceRequestMemory: "256Mi"
                resourceLimitCpu: "500m"
                resourceLimitMemory: "512Mi"
              - name: "python"
                image: "python:3.12.4-slim-bookworm"
                alwaysPullImage: false
                workingDir: "/home/jenkins/agent"
                ttyEnabled: true
                command: "/bin/sh -c"
                args: "cat"
                resourceRequestCpu: "250m"
                resourceRequestMemory: "512Mi"
                resourceLimitCpu: "2000m"
                resourceLimitMemory: "2Gi"
                envVars:
                  - envVar:
                      key: "PIP_CACHE_DIR"
                      value: "/home/jenkins/.cache/pip"
                  - envVar:
                      key: "PYTHONDONTWRITEBYTECODE"
                      value: "1"
            volumes:
              - persistentVolumeClaim:
                  claimName: "pip-cache-pvc"
                  mountPath: "/home/jenkins/.cache/pip"
                  readOnly: false

          # ── go-agent ─────────────────────────────────────────────────────
          - name: "go-agent"
            label: "go golang go122"
            namespace: "${JENKINS_NAMESPACE:-jenkins}"
            serviceAccount: "jenkins-agent"
            nodeUsageMode: NORMAL
            idleMinutes: 5
            instanceCap: 10
            containers:
              - name: "jnlp"
                image: "jenkins/inbound-agent:3261.v9c670a_4748a_9-1"
                alwaysPullImage: false
                workingDir: "/home/jenkins/agent"
                ttyEnabled: false
                resourceRequestCpu: "100m"
                resourceRequestMemory: "256Mi"
                resourceLimitCpu: "500m"
                resourceLimitMemory: "512Mi"
              - name: "go"
                image: "golang:1.22.5-bookworm"
                alwaysPullImage: false
                workingDir: "/home/jenkins/agent"
                ttyEnabled: true
                command: "/bin/sh -c"
                args: "cat"
                resourceRequestCpu: "250m"
                resourceRequestMemory: "512Mi"
                resourceLimitCpu: "2000m"
                resourceLimitMemory: "2Gi"
                envVars:
                  - envVar:
                      key: "GOPATH"
                      value: "/home/jenkins/go"
                  - envVar:
                      key: "GOCACHE"
                      value: "/home/jenkins/.cache/go-build"
                  - envVar:
                      key: "GOMODCACHE"
                      value: "/home/jenkins/go/pkg/mod"
            volumes:
              - persistentVolumeClaim:
                  claimName: "go-cache-pvc"
                  mountPath: "/home/jenkins/go"
                  readOnly: false

# ── Credentials ───────────────────────────────────────────────────────────────
credentials:
  system:
    domainCredentials:
      - credentials:
          # GitHub App credential
          - githubApp:
              id: "github-app"
              description: "GitHub App — jenkins-plus"
              appID: "${GITHUB_APP_ID:-0}"
              privateKey: "${GITHUB_APP_KEY:-}"

          # GitLab personal/project access token
          - string:
              id: "gitlab-token"
              description: "GitLab API token"
              secret: "${GITLAB_TOKEN:-}"

          # HashiCorp Vault AppRole
          - vaultAppRoleCredential:
              id: "vault-approle"
              description: "HashiCorp Vault AppRole"
              roleId: "${VAULT_ROLE_ID:-}"
              secretId: "${VAULT_SECRET_ID:-}"

          # Slack bot token
          - string:
              id: "slack-token"
              description: "Slack Bot OAuth token"
              secret: "${SLACK_TOKEN:-}"

          # SonarQube user token
          - string:
              id: "sonar-token"
              description: "SonarQube user token"
              secret: "${SONAR_TOKEN:-}"

          # Docker registry (username + password)
          - usernamePassword:
              id: "docker-registry"
              description: "Docker registry credentials"
              username: "${DOCKER_REGISTRY_USER:-jenkins}"
              password: "${DOCKER_REGISTRY_PASSWORD:-}"
              usernameSecret: false

          # Generic SSH key for deployment hosts
          - basicSSHUserPrivateKey:
              id: "deploy-ssh-key"
              description: "SSH key for deployment targets"
              username: "${DEPLOY_SSH_USER:-deploy}"
              privateKeySource:
                directEntry:
                  privateKey: "${DEPLOY_SSH_KEY:-}"

# ── Unclassified / plugin configuration ───────────────────────────────────────
unclassified:

  # ── Location ────────────────────────────────────────────────────────────────
  location:
    url: "${JENKINS_URL:-http://localhost:8080}/"
    adminAddress: "${ADMIN_EMAIL:-jenkins@example.com}"

  # ── Slack ────────────────────────────────────────────────────────────────────
  slackNotifier:
    teamDomain: "${SLACK_TEAM_DOMAIN:-mycompany}"
    tokenCredentialId: "slack-token"
    botUser: true
    room: "${SLACK_DEFAULT_CHANNEL:-#ci-builds}"
    baseUrl: "${SLACK_BASE_URL:-}"

  # ── SonarQube ─────────────────────────────────────────────────────────────
  sonarGlobalConfiguration:
    buildWrapperEnabled: true
    installations:
      - name: "SonarQube"
        serverUrl: "${SONAR_URL:-http://sonarqube:9000}"
        credentialsId: "sonar-token"
        mojoVersion: ""
        triggers:
          skipScmCause: false
          skipUpstreamCause: false

  # ── GitHub ────────────────────────────────────────────────────────────────
  gitHubPluginConfig:
    apiRateLimitChecker: ThrottleOnOver
    configs:
      - credentialsId: "github-app"
        name: "GitHub"

  # ── GitLab ────────────────────────────────────────────────────────────────
  gitLabConnectionConfig:
    connections:
      - apiTokenId: "gitlab-token"
        clientBuilderId: "autodetect"
        connectionTimeout: 10
        ignoreCertificateErrors: false
        name: "GitLab"
        readTimeout: 10
        url: "${GITLAB_URL:-https://gitlab.com}"

  # ── Prometheus ────────────────────────────────────────────────────────────
  prometheusConfiguration:
    appendParamLabel: false
    appendStatusLabel: true
    collectingMetricsPeriodInSeconds: 30
    countAbortedBuilds: true
    countFailedBuilds: true
    countNotBuiltBuilds: false
    countSuccessfulBuilds: true
    countUnstableBuilds: true
    defaultNamespace: "jenkins"
    fetchTestResults: true
    jobAttributeName: "jenkins_job"
    path: "prometheus"
    processingDisabledBuilds: false
    useAuthenticatedEndpoint: false

  # ── HashiCorp Vault ──────────────────────────────────────────────────────
  hashicorpVault:
    configuration:
      engineVersion: 2
      timeout: 60
      vaultCredentialId: "vault-approle"
      vaultUrl: "${VAULT_URL:-http://vault:8200}"

  # ── OpenTelemetry ─────────────────────────────────────────────────────────
  openTelemetry:
    configurationProperties: |
      otel.exporter.otlp.endpoint=${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4317}
      otel.exporter.otlp.protocol=grpc
      otel.traces.exporter=otlp
      otel.metrics.exporter=otlp
    exportOpenTelemetryConfigurationAsEnvironmentVariables: true
    observabilityBackends:
      - jaeger:
          jaegerBaseUrl: "${JAEGER_URL:-http://jaeger:16686}"
          name: "Jaeger"

  # ── Email ─────────────────────────────────────────────────────────────────
  mailer:
    smtpHost: "${SMTP_HOST:-localhost}"
    smtpPort: "${SMTP_PORT:-25}"
    useSsl: false
    useTls: false
    charset: "UTF-8"
    replyToAddress: "${ADMIN_EMAIL:-jenkins@example.com}"

  extendedEmailPublisher:
    adminRequiredForTemplateTesting: false
    allowUnregisteredEnabled: false
    charset: "UTF-8"
    debugMode: false
    defaultBody: |-
      $PROJECT_NAME - Build # $BUILD_NUMBER - $BUILD_STATUS:

      Check console output at $BUILD_URL to view the results.
    defaultContentType: "text/html"
    defaultSubject: "$PROJECT_NAME - Build # $BUILD_NUMBER - $BUILD_STATUS!"
    defaultTriggerIds:
      - "hudson.plugins.emailext.plugins.trigger.FailureTrigger"
      - "hudson.plugins.emailext.plugins.trigger.FixedTrigger"
    mailAccount:
      smtpHost: "${SMTP_HOST:-localhost}"
      smtpPort: "${SMTP_PORT:-25}"
    maxAttachmentSize: -1
    maxAttachmentSizeMb: 0
    precedenceBulk: false
    watchingEnabled: false

  # ── Global pipeline library (jenkins-plus shared library) ────────────────
  globalLibraries:
    libraries:
      - name: "jenkins-plus"
        retriever:
          modernSCM:
            scm:
              git:
                credentialsId: "github-app"
                remote: "${SHARED_LIB_REPO:-https://github.com/example/jenkins-plus-shared-library.git}"
                traits:
                  - gitBranchDiscovery
        defaultVersion: "${SHARED_LIB_BRANCH:-main}"
        implicit: false
        allowVersionOverride: true
        includeInChangesets: false

  # ── Timestamper ───────────────────────────────────────────────────────────
  timestamper:
    allPipelines: true
    elapsedTimeFormat: "'<b>'HH:mm:ss.S'</b> '"
    systemTimeFormat: "'<b>'HH:mm:ss'</b> '"

  # ── AnsiColor ─────────────────────────────────────────────────────────────
  ansiColorBuildWrapper:
    globalColorMapName: "xterm"

  # ── Throttle ──────────────────────────────────────────────────────────────
  throttleJobProperty:
    categories:
      - categoryName: "docker-builds"
        maxConcurrentPerNode: 2
        maxConcurrentTotal: 5
      - categoryName: "deployments"
        maxConcurrentPerNode: 1
        maxConcurrentTotal: 3

# ── Seed job (Job DSL) ────────────────────────────────────────────────────────
jobs:
  - script: |
      // Seed job — discovers and registers all pipeline jobs from the org
      organizationFolder('seed-org-scan') {
        description('Automatically discovers all repositories with Jenkinsfiles in the GitHub org.')
        organizations {
          github {
            repoOwner("${GITHUB_ORG:-example-org}")
            credentialsId('github-app')
            traits {
              gitHubBranchDiscovery { strategyId(1) }
              gitHubPullRequestDiscovery { strategyId(2) }
              gitHubForkDiscovery {
                strategyId(1)
                trust { gitHubTrustPermissions() }
              }
            }
          }
        }
        projectFactories {
          workflowMultiBranchProjectFactory {
            scriptPath('Jenkinsfile')
          }
        }
        triggers {
          periodicFolderTrigger {
            interval('1d')
          }
        }
        orphanedItemStrategy {
          discardOldItems {
            daysToKeep(30)
            numToKeep(50)
          }
        }
      }
