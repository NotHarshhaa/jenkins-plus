---
# go-agent.yaml
# Jenkins Kubernetes pod template — Go 1.22 build agent.
#
# Labels: go  golang  go122
#
# Containers:
#   jnlp — Jenkins inbound agent (required by Kubernetes plugin)
#   go   — Go 1.22; go build / go test / golangci-lint available
#
# GOPATH and module cache are persisted on a PVC so the module proxy cache is
# reused across builds, dramatically reducing cold-start times.
#
# Usage in a Jenkinsfile:
#   agent { label 'go122' }
#   steps { container('go') { sh 'go test ./...' } }

apiVersion: v1
kind: Pod
metadata:
  labels:
    jenkins-agent: go-agent
  annotations:
    cluster-autoscaler.kubernetes.io/safe-to-evict: "true"
spec:
  serviceAccountName: jenkins-agent

  affinity:
    nodeAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 50
          preference:
            matchExpressions:
              - key: jenkins-pool
                operator: In
                values:
                  - build

  volumes:
    - name: go-cache
      persistentVolumeClaim:
        claimName: go-cache-pvc
    - name: workspace
      emptyDir: {}

  containers:
    # ── JNLP agent ──────────────────────────────────────────────────────────
    - name: jnlp
      image: jenkins/inbound-agent:3261.v9c670a_4748a_9-1
      imagePullPolicy: IfNotPresent
      workingDir: /home/jenkins/agent
      env:
        - name: JENKINS_AGENT_WORKDIR
          value: /home/jenkins/agent
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi
      volumeMounts:
        - name: workspace
          mountPath: /home/jenkins/agent

    # ── Go 1.22 ──────────────────────────────────────────────────────────────
    - name: go
      image: golang:1.22.5-bookworm
      imagePullPolicy: IfNotPresent
      workingDir: /home/jenkins/agent
      command:
        - /bin/sh
        - -c
        - cat
      tty: true
      env:
        - name: GOPATH
          value: /home/jenkins/go
        - name: GOCACHE
          value: /home/jenkins/.cache/go-build
        - name: GOMODCACHE
          value: /home/jenkins/go/pkg/mod
        - name: CGO_ENABLED
          value: "0"
        - name: GOFLAGS
          value: "-mod=mod"
        - name: HOME
          value: /home/jenkins
      resources:
        requests:
          cpu: 250m
          memory: 512Mi
        limits:
          cpu: "2"
          memory: 2Gi
      volumeMounts:
        - name: go-cache
          mountPath: /home/jenkins/go
        - name: workspace
          mountPath: /home/jenkins/agent

  terminationGracePeriodSeconds: 30
