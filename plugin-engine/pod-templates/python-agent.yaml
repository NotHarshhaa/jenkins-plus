---
# python-agent.yaml
# Jenkins Kubernetes pod template — Python 3.12 build agent.
#
# Labels: python  python3  python312
#
# Containers:
#   jnlp    — Jenkins inbound agent (required by Kubernetes plugin)
#   python  — Python 3.12 slim; pip / virtualenv / pytest available
#
# pip cache is persisted on a PVC to speed up repeated dependency installs.
#
# Usage in a Jenkinsfile:
#   agent { label 'python312' }
#   steps { container('python') { sh 'pip install -r requirements.txt && pytest' } }

apiVersion: v1
kind: Pod
metadata:
  labels:
    jenkins-agent: python-agent
  annotations:
    cluster-autoscaler.kubernetes.io/safe-to-evict: "true"
spec:
  serviceAccountName: jenkins-agent

  affinity:
    nodeAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 50
          preference:
            matchExpressions:
              - key: jenkins-pool
                operator: In
                values:
                  - build

  volumes:
    - name: pip-cache
      persistentVolumeClaim:
        claimName: pip-cache-pvc
    - name: workspace
      emptyDir: {}

  containers:
    # ── JNLP agent ──────────────────────────────────────────────────────────
    - name: jnlp
      image: jenkins/inbound-agent:3261.v9c670a_4748a_9-1
      imagePullPolicy: IfNotPresent
      workingDir: /home/jenkins/agent
      env:
        - name: JENKINS_AGENT_WORKDIR
          value: /home/jenkins/agent
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi
      volumeMounts:
        - name: workspace
          mountPath: /home/jenkins/agent

    # ── Python 3.12 ──────────────────────────────────────────────────────────
    - name: python
      image: python:3.12.4-slim-bookworm
      imagePullPolicy: IfNotPresent
      workingDir: /home/jenkins/agent
      command:
        - /bin/sh
        - -c
        - cat
      tty: true
      env:
        - name: PIP_CACHE_DIR
          value: /home/jenkins/.cache/pip
        - name: PIP_NO_COMPILE
          value: "1"
        - name: PYTHONDONTWRITEBYTECODE
          value: "1"
        - name: PYTHONUNBUFFERED
          value: "1"
        - name: HOME
          value: /home/jenkins
      resources:
        requests:
          cpu: 250m
          memory: 512Mi
        limits:
          cpu: "2"
          memory: 2Gi
      volumeMounts:
        - name: pip-cache
          mountPath: /home/jenkins/.cache/pip
        - name: workspace
          mountPath: /home/jenkins/agent

  terminationGracePeriodSeconds: 30
