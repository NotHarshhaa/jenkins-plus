name: Build & Test

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: notharshhaa/jenkins-plus
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── UI unit tests ────────────────────────────────────────────────────────────
  ui-test:
    name: UI — lint & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test -- --ci --coverage --forceExit

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ui-coverage
          path: ui/coverage/

  # ── Docker build & integration test ──────────────────────────────────────────
  docker-build:
    name: Docker — build & integration test
    runs-on: ubuntu-latest
    needs: ui-test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: false
          load: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      - name: Move cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      - name: Prepare .env for integration test
        run: |
          cp .env.example .env
          sed -i 's/^ADMIN_PASSWORD=.*/ADMIN_PASSWORD=testpassword/' .env
          sed -i 's/^ADMIN_USER=.*/ADMIN_USER=admin/' .env
          sed -i 's|^JENKINS_URL=.*|JENKINS_URL=http://localhost:8080|' .env

      - name: Start stack
        run: |
          # Override image tag to use the one we just built
          IMAGE_TAG=${{ github.sha }} docker compose up -d jenkins-plus
        env:
          COMPOSE_FILE: docker-compose.yml

      - name: Wait for Jenkins to become healthy
        run: |
          JENKINS_URL=http://localhost:8080 \
          HEALTHCHECK_TIMEOUT=180 \
          bash docker/scripts/healthcheck.sh

      - name: Run plugin verification
        run: |
          # Wait a bit more for Jenkins to be fully ready for API requests
          sleep 10
          # First, test if Jenkins is reachable from inside the container
          docker exec jenkins-plus curl -sf http://localhost:8080/login || echo "Jenkins not reachable on /login"
          docker exec jenkins-plus curl -sf http://localhost:8080/pluginManager/api/json?depth=1 --user admin:testpassword || echo "API not reachable"
          # Now run the actual verification
          docker exec jenkins-plus \
            env ADMIN_USER=admin ADMIN_PASSWORD=testpassword JENKINS_URL=http://localhost:8080 \
            bash /usr/local/bin/jenkins-plus/plugin-verify.sh

      - name: Collect Jenkins logs on failure
        if: failure()
        run: docker compose logs jenkins-plus

      - name: Tear down stack
        if: always()
        run: docker compose down -v

  # ── Push to GHCR (master branch only) ──────────────────────────────────────────
  push-image:
    name: Push to GHCR
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GH_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=,format=short

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      - name: Move cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache
