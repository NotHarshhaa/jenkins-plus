name: Helm Lint & Dry-Run

on:
  push:
    paths:
      - "helm/**"
      - ".github/workflows/helm-lint.yml"
  pull_request:
    paths:
      - "helm/**"
      - ".github/workflows/helm-lint.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  helm-lint:
    name: Helm — lint & template dry-run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: "3.15.2"

      - name: Helm lint
        run: helm lint ./helm

      - name: Helm template dry-run (default values)
        run: |
          helm template jenkins-plus ./helm \
            --debug \
            --dry-run \
            --set jenkins.adminPassword=test \
            --set jenkins.url=http://localhost:8080 \
            > /tmp/helm-template-output.yaml
          echo "Template rendered successfully ($(wc -l < /tmp/helm-template-output.yaml) lines)."

      - name: Validate rendered manifests with kubeval
        run: |
          curl -sSL https://github.com/instrumenta/kubeval/releases/latest/download/kubeval-linux-amd64.tar.gz \
            | tar xz -C /usr/local/bin/
          kubeval --strict /tmp/helm-template-output.yaml || true

      - name: Upload rendered manifests
        uses: actions/upload-artifact@v4
        with:
          name: helm-rendered-manifests
          path: /tmp/helm-template-output.yaml
          retention-days: 7
