---
# node-agent.yaml
# Jenkins Kubernetes pod template — Node.js 20 LTS build agent.
#
# Labels: node  nodejs  node20
#
# Containers:
#   jnlp  — Jenkins inbound agent (required by Kubernetes plugin)
#   node  — Node.js 20 LTS; npm / yarn / pnpm available after installation
#
# npm cache is persisted on a PVC so subsequent builds skip re-downloading deps.
#
# Usage in a Jenkinsfile:
#   agent { label 'node20' }
#   steps { container('node') { sh 'npm ci && npm test' } }

apiVersion: v1
kind: Pod
metadata:
  labels:
    jenkins-agent: node-agent
  annotations:
    cluster-autoscaler.kubernetes.io/safe-to-evict: "true"
spec:
  serviceAccountName: jenkins-agent

  affinity:
    nodeAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 50
          preference:
            matchExpressions:
              - key: jenkins-pool
                operator: In
                values:
                  - build

  volumes:
    - name: npm-cache
      persistentVolumeClaim:
        claimName: npm-cache-pvc
    - name: workspace
      emptyDir: {}

  containers:
    # ── JNLP agent ──────────────────────────────────────────────────────────
    - name: jnlp
      image: jenkins/inbound-agent:3261.v9c670a_4748a_9-1
      imagePullPolicy: IfNotPresent
      workingDir: /home/jenkins/agent
      env:
        - name: JENKINS_AGENT_WORKDIR
          value: /home/jenkins/agent
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi
      volumeMounts:
        - name: workspace
          mountPath: /home/jenkins/agent

    # ── Node.js 20 LTS ───────────────────────────────────────────────────────
    - name: node
      image: node:20.14.0-alpine3.20
      imagePullPolicy: IfNotPresent
      workingDir: /home/jenkins/agent
      command:
        - /bin/sh
        - -c
        - cat
      tty: true
      env:
        - name: NPM_CONFIG_CACHE
          value: /home/jenkins/.npm
        - name: NPM_CONFIG_PREFER_OFFLINE
          value: "true"
        - name: CI
          value: "true"
        - name: HOME
          value: /home/jenkins
      resources:
        requests:
          cpu: 250m
          memory: 512Mi
        limits:
          cpu: "2"
          memory: 2Gi
      volumeMounts:
        - name: npm-cache
          mountPath: /home/jenkins/.npm
        - name: workspace
          mountPath: /home/jenkins/agent

  terminationGracePeriodSeconds: 30
