global:
  scrape_interval:     30s
  evaluation_interval: 30s
  scrape_timeout:      10s
  external_labels:
    monitor: 'jenkins-plus'

# ── Alertmanager (optional — uncomment and configure when ready) ───────────────
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets: ['alertmanager:9093']

# ── Rule files ────────────────────────────────────────────────────────────────
# rule_files:
#   - /etc/prometheus/rules/*.yml

# ── Scrape configurations ─────────────────────────────────────────────────────
scrape_configs:

  # ── Jenkins (via prometheus plugin at /prometheus) ─────────────────────────
  - job_name: 'jenkins'
    metrics_path: '/prometheus'
    scrape_interval: 30s
    scrape_timeout: 10s
    scheme: http
    basic_auth:
      username: '${JENKINS_USER:-admin}'
      password: '${JENKINS_TOKEN:-admin}'
    static_configs:
      - targets:
          - 'jenkins-plus:8080'
        labels:
          service: 'jenkins'
          environment: '${ENVIRONMENT:-local}'

  # ── Prometheus self-monitoring ────────────────────────────────────────────
  - job_name: 'prometheus'
    metrics_path: '/metrics'
    scrape_interval: 30s
    static_configs:
      - targets:
          - 'localhost:9090'
        labels:
          service: 'prometheus'

  # ── Nginx (requires nginx-prometheus-exporter sidecar if added later) ──────
  # - job_name: 'nginx'
  #   static_configs:
  #     - targets: ['nginx-exporter:9113']
