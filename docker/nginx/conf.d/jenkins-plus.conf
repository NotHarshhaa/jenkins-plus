
# jenkins-plus.conf — reverse-proxy for all services behind nginx.

# ── HTTP server (port 80) ─────────────────────────────────────────────────────
server {
    listen       80;
    server_name  _;

    # ── Global security headers ────────────────────────────────────────────────
    add_header X-Frame-Options            "SAMEORIGIN"                        always;
    add_header X-Content-Type-Options     "nosniff"                           always;
    add_header X-XSS-Protection           "1; mode=block"                     always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin"   always;
    add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()" always;

    client_max_body_size 100m;

    # ── UI (Next.js — catch-all, must come after more-specific locations) ─────
    location / {
        proxy_pass         http://ui;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";

        proxy_read_timeout  60s;
        proxy_send_timeout  60s;
        proxy_connect_timeout 10s;
    }

    # ── Jenkins ────────────────────────────────────────────────────────────────
    # Strip the /jenkins prefix before forwarding so Jenkins sees its own root.
    location /jenkins/ {
        proxy_pass         http://jenkins/;
        proxy_http_version 1.1;

        proxy_set_header   Host                    $host;
        proxy_set_header   X-Real-IP               $remote_addr;
        proxy_set_header   X-Forwarded-For         $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto       $scheme;
        proxy_set_header   X-Forwarded-Host        $host;
        proxy_set_header   X-Forwarded-Port        $server_port;
        proxy_set_header   Upgrade                 $http_upgrade;
        proxy_set_header   Connection              $connection_upgrade;

        # Long timeout: build log streaming can run for many minutes
        proxy_read_timeout    900s;
        proxy_send_timeout    900s;
        proxy_connect_timeout 10s;

        # Must be off so Jenkins console output streams to browser in real-time
        proxy_request_buffering  off;
        proxy_buffering          off;

        # Required for WebSocket agent connections
        proxy_set_header   Sec-WebSocket-Extensions $http_sec_websocket_extensions;
        proxy_set_header   Sec-WebSocket-Key        $http_sec_websocket_key;
        proxy_set_header   Sec-WebSocket-Version    $http_sec_websocket_version;
    }

    # ── Jenkins direct access (root, no prefix) ────────────────────────────────
    # Allows tools like the Jenkins CLI and inbound agents to call :80 directly.
    location = /login {
        proxy_pass         http://jenkins/login;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── Prometheus metrics scrape endpoint ────────────────────────────────────
    location /prometheus {
        proxy_pass         http://jenkins/prometheus;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_read_timeout  60s;
        proxy_send_timeout  60s;
        proxy_connect_timeout 10s;
    }

    # ── Grafana ────────────────────────────────────────────────────────────────
    location /grafana/ {
        proxy_pass         http://grafana:3000/;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";

        proxy_read_timeout  60s;
    }

    # ── Health check endpoint (for load-balancer probes) ─────────────────────
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}

# ── WebSocket upgrade map ─────────────────────────────────────────────────────
# Defined at http block level via map; referenced in proxy_set_header Connection above.
# NOTE: The map block must live in the http context (nginx.conf), but the variable
# $connection_upgrade is available here because nginx.conf includes this file inside http{}.
